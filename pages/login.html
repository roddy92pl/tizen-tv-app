<!--
  Login page HTML fragment.
  This file is provided for standalone reference.
  The application uses the #page-login section embedded in index.html.
-->
<section id="page-login" class="page active">
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">▶</div>
            <h1>IPTV Player</h1>
            <p>Powered by Xtream Codes API</p>
        </div>
        <form id="login-form" class="login-form" autocomplete="off">
            <div class="form-group">
                <label for="server-url">Server URL</label>
                <input type="text" id="server-url" class="focusable" placeholder="http://domain:port"
                       tabindex="1" autocomplete="off" spellcheck="false"/>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="focusable" placeholder="Enter username"
                       tabindex="2" autocomplete="off" spellcheck="false"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="focusable" placeholder="Enter password"
                       tabindex="3" autocomplete="off"/>
            </div>
            <div class="form-row">
                <button type="submit" id="btn-login" class="btn btn-primary focusable" tabindex="4">
                    Connect
                </button>
            </div>
            <div id="login-error" class="login-error hidden"></div>
        </form>
        <div class="login-profiles" id="login-profiles">
            <h3>Saved Profiles</h3>
            <div id="profiles-list" class="profiles-list"></div>
        </div>
    </div>
</section>
